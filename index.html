<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport"
        content="width=device-width, initial-scale=1.0, maximum-scale=1.0,
                 user-scalable=no, viewport-fit=cover" />
  <title>🍽️ My Restaurant</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%;
      background: #FCE4EC;
      overflow: hidden;
      touch-action: none;
      font-family: 'Segoe UI Emoji', 'Apple Color Emoji', sans-serif;
    }

    #wrapper {
      position: absolute;
      width: 390px;
      height: 720px;
      transform-origin: top left;
    }

    canvas {
      display: block;
      width: 390px;
      height: 720px;
      image-rendering: pixelated;
    }

    /* ── Loading screen ── */
    #loading {
      position: absolute; inset: 0;
      background: #FCE4EC;
      display: flex; flex-direction: column;
      justify-content: center; align-items: center;
      gap: 16px;
      z-index: 10;
    }

    .loading-logo {
      font-size: 64px;
      animation: bounce 1s infinite ease-in-out;
    }

    .loading-title {
      color: #AD1457;
      font-size: 26px;
      font-weight: bold;
      letter-spacing: 1px;
      text-shadow: 0 0 20px rgba(255,165,0,0.6);
    }

    .loading-sub {
      color: #F48FB1;
      font-size: 14px;
    }

    #loading-bar-bg {
      width: 260px; height: 8px;
      background: #1a0800;
      border-radius: 4px;
      border: 1px solid #5C3A1E;
    }

    #loading-bar {
      height: 100%; width: 0%;
      background: linear-gradient(90deg, #F48FB1, #F06292);
      border-radius: 4px;
      transition: width 0.15s ease;
    }

    #loading-msg {
      font-size: 12px;
      color: #5C3A1E;
    }

    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50%       { transform: translateY(-12px); }
    }

    /* ── Tap to start overlay ── */

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }
  </style>
</head>
<body>
<!-- Android/iOS audio unlock: resume any suspended Audio on first touch -->
<script>
(function(){
  var evs = ['touchstart','touchend','pointerdown','mousedown','click','keydown'];
  function unlock() {
    // Resume any suspended HTMLAudio or AudioContext
    try {
      var C = window.AudioContext || window.webkitAudioContext;
      if (C) {
        var actx = new C();
        if (actx.state === 'suspended') actx.resume();
        // play a silent buffer to unblock audio pipeline
        var buf = actx.createBuffer(1,1,22050);
        var src = actx.createBufferSource();
        src.buffer = buf; src.connect(actx.destination); src.start(0);
      }
    } catch(e) {}
    // Try to resume bgm if game already started
    try {
      if (window._bgmEl && window._bgmEl.paused) window._bgmEl.play().catch(function(){});
    } catch(e) {}
  }
  evs.forEach(function(ev){
    document.addEventListener(ev, unlock, {passive:true, capture:true});
  });
})();
</script>

<div id="wrapper">
  <canvas id="gameCanvas" width="390" height="720"></canvas>

  <div id="loading">
    <div class="loading-logo">🍳</div>
    <div class="loading-title">My Restaurant</div>
    <div class="loading-sub">ร้านอาหารของหนู 🌸</div>
    <div id="loading-bar-bg"><div id="loading-bar"></div></div>
    <div id="loading-msg">กำลังเตรียมวัตถุดิบ...</div>
  </div>


</div>

<!-- ════ Scripts ════ -->
<script src="js/settings.js"></script>
<script src="js/ranking.js"></script>
<script src="js/player.js"></script>
<script src="js/customer.js"></script>
<script src="js/kitchen.js"></script>
<script src="js/hud.js"></script>
<script src="js/game.js"></script>

<script>
(function () {
  // ── Scale wrapper to fit screen ──
  function fitScreen() {
    const wrapper = document.getElementById('wrapper');
    const scaleX  = window.innerWidth  / 390;
    const scaleY  = window.innerHeight / 720;
    const scale   = Math.min(scaleX, scaleY);
    const offsetX = (window.innerWidth  - 390 * scale) / 2;
    const offsetY = (window.innerHeight - 720 * scale) / 2;
    wrapper.style.transform = `scale(${scale})`;
    wrapper.style.left = `${offsetX}px`;
    wrapper.style.top  = `${offsetY}px`;
  }
  fitScreen();
  window.addEventListener('resize', fitScreen);

  // ── Simulate loading (no real assets needed for placeholder mode) ──
  const barEl = document.getElementById('loading-bar');
  const msgEl = document.getElementById('loading-msg');
  const msgs  = ['กำลังตั้งเตา...', 'เตรียมวัตถุดิบ...', 'จัดโต๊ะลูกค้า...', 'พร้อมเปิดร้านแล้ว! 🎉'];
  let progress = 0;

  const interval = setInterval(() => {
    progress += Math.random() * 18 + 8;
    if (progress >= 100) { progress = 100; clearInterval(interval); showStart(); }
    barEl.style.width = `${progress}%`;
    msgEl.textContent = msgs[Math.min(Math.floor(progress / 25), msgs.length - 1)];
  }, 120);

  function showStart() {
    setTimeout(() => {
      document.getElementById('loading').style.display = 'none';
      startGame();
    }, 400);
  }

  function startGame() {
    const canvas = document.getElementById('gameCanvas');
    const game   = new Game(canvas);

    // ── Image assets ──────────────────────────────
    const imgDefs = [
      { key: 'player',       src: 'assets/images/player.png'        },
      { key: 'bgOutside',    src: 'assets/images/bg_outside.png'    },
      { key: 'menuBurger',   src: 'assets/images/menu_burger.png'   },
      { key: 'menuChicken',  src: 'assets/images/menu_chicken.png'  },
      { key: 'menuFries',    src: 'assets/images/menu_fries.png'    },
      { key: 'menuDonut',    src: 'assets/images/menu_donut.png'    },
      { key: 'stationPrep',  src: 'assets/images/station_prep.png'  },
      { key: 'stationCook',  src: 'assets/images/station_cook.png'  },
      { key: 'stationPlate', src: 'assets/images/station_plate.png' },
      { key: 'stationServe', src: 'assets/images/station_serve.png' },
      // Interior background
      { key: 'bgInside',    src: 'assets/images/bg_inside.png'     },
      // Customer sprites
      { key: 'custStudent', src: 'assets/images/cust_student.png'  },
      { key: 'custOffice',  src: 'assets/images/cust_office.png'   },
      { key: 'custElder',   src: 'assets/images/cust_elder.png'    },
      { key: 'custCouple',  src: 'assets/images/cust_couple.png'   },
      { key: 'custTourist', src: 'assets/images/cust_tourist.png'  },
      { key: 'custVip',     src: 'assets/images/cust_vip.png'      },
    ];

    // ── Sound assets ─────────────────────────────
    // SFX are synthesized via Web Audio (no external files needed).
    // BGM tries to load from file; falls back to silence gracefully.
    const images = {}, sounds = {};

    // Pre-build all SFX immediately (synth, no loading needed)
    sounds.coin  = _makeCoin();
    sounds.serve = _makeServe();
    sounds.anger = _makeAnger();
    sounds.cheer = _makeCheer();
    sounds.error = _makeBeep(880, 0.12, 'square');

    // Load BGM from file (optional)
    let total  = imgDefs.length + 1;  // +1 for bgm
    let loaded = 0;
    const tryStart = () => {
      loaded++;
      if (loaded >= total) {
        game.setImages(images);
        game.setSounds(sounds);
        game.start();
      }
    };

    imgDefs.forEach(def => {
      const img = new Image();
      img.onload  = () => { images[def.key] = img;  tryStart(); };
      img.onerror = () => { images[def.key] = null; tryStart(); };
      img.src = def.src;
    });

    // BGM — load from file, fallback to null (game still works, just no music)
    (function loadBGM() {
      const aud = new Audio();
      aud.preload = 'auto';
      aud.volume  = 0.35;
      aud.loop    = true;
      let _done = false;
      const done = (val) => { if (_done) return; _done = true; sounds.bgm = val; tryStart(); };
      aud.addEventListener('canplaythrough', () => done(aud), { once: true });
      aud.addEventListener('error',          () => done(null), { once: true });
      setTimeout(() => done(aud), 5000);
      aud.src = 'assets/sounds/bgm.mp3';
    })();
  }

  // ── Web Audio SFX synthesizer ──────────────────────────────────────
  // Single shared AudioContext
  let _actx = null;
  function getACtx() {
    if (!_actx) {
      try { _actx = new (window.AudioContext || window.webkitAudioContext)(); } catch(e) {}
    }
    return _actx;
  }
  // Resume context on first touch (Android unlock)
  ['touchstart','pointerdown','click'].forEach(ev =>
    document.addEventListener(ev, () => { try { getACtx()?.resume(); } catch(e){} }, { once: true, passive: true })
  );

  function _makeSfx(fn) {
    // fn(ctx) — plays the sound using Web Audio API
    const obj = {
      play:      () => { try { const c=getACtx(); if(c){ if(c.state==='suspended') c.resume().then(()=>fn(c)); else fn(c); } return Promise.resolve(); } catch(e){ return Promise.resolve(); } },
      cloneNode: () => ({ play: () => obj.play() }),
      volume: 0.6,
    };
    return obj;
  }

  // ── coin: bright ping ─────────────────────────
  function _makeCoin() {
    return _makeSfx(ctx => {
      const t = ctx.currentTime;
      [880, 1108, 1320].forEach((f, i) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'sine'; osc.frequency.value = f;
        g.gain.setValueAtTime(0, t + i*0.04);
        g.gain.linearRampToValueAtTime(0.22, t + i*0.04 + 0.01);
        g.gain.exponentialRampToValueAtTime(0.001, t + i*0.04 + 0.18);
        osc.start(t + i*0.04); osc.stop(t + i*0.04 + 0.2);
      });
    });
  }

  // ── serve: cheerful two-tone pop ──────────────
  function _makeServe() {
    return _makeSfx(ctx => {
      const t = ctx.currentTime;
      [[523,0],[659,0.1],[784,0.2]].forEach(([f,d]) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'triangle'; osc.frequency.value = f;
        g.gain.setValueAtTime(0.25, t+d);
        g.gain.exponentialRampToValueAtTime(0.001, t+d+0.15);
        osc.start(t+d); osc.stop(t+d+0.18);
      });
    });
  }

  // ── anger: low buzz growl ─────────────────────
  function _makeAnger() {
    return _makeSfx(ctx => {
      const t = ctx.currentTime;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = 'sawtooth'; osc.frequency.setValueAtTime(180, t);
      osc.frequency.exponentialRampToValueAtTime(80, t+0.4);
      g.gain.setValueAtTime(0.28, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+0.45);
      osc.start(t); osc.stop(t+0.5);
    });
  }

  // ── cheer: ascending fanfare ──────────────────
  function _makeCheer() {
    return _makeSfx(ctx => {
      const t = ctx.currentTime;
      [523,659,784,1047].forEach((f,i) => {
        const osc = ctx.createOscillator(), g = ctx.createGain();
        osc.connect(g); g.connect(ctx.destination);
        osc.type = 'triangle'; osc.frequency.value = f;
        g.gain.setValueAtTime(0.2, t+i*0.08);
        g.gain.exponentialRampToValueAtTime(0.001, t+i*0.08+0.2);
        osc.start(t+i*0.08); osc.stop(t+i*0.08+0.25);
      });
    });
  }

  // ── error: descending buzz ────────────────────
  function _makeBeep(freq, duration, type) {
    return _makeSfx(ctx => {
      const t = ctx.currentTime;
      const osc = ctx.createOscillator(), g = ctx.createGain();
      osc.connect(g); g.connect(ctx.destination);
      osc.type = type || 'square'; osc.frequency.value = freq;
      g.gain.setValueAtTime(0.22, t);
      g.gain.exponentialRampToValueAtTime(0.001, t+duration);
      osc.start(t); osc.stop(t+duration+0.02);
    });
  }
  // (kept for compatibility — error beep uses _makeBeep)
  function __unused(freq, duration, type) {
    let _actx2 = null;
    function getCtx() {
      if (!_actx2) _actx2 = new (window.AudioContext || window.webkitAudioContext)();
      return _actx2;
    }
    function playBeep() {
      try {
        const ctx = getCtx();
        const osc = ctx.createOscillator();
        const gain = ctx.createGain();
        osc.connect(gain); gain.connect(ctx.destination);
        osc.type = type || 'square';
        osc.frequency.value = freq;
        gain.gain.setValueAtTime(0.25, ctx.currentTime);
        gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
        osc.start(ctx.currentTime);
        osc.stop(ctx.currentTime + duration + 0.01);
        return Promise.resolve();
      } catch(e) { return Promise.resolve(); }
    }
    const obj = {
      play:      () => playBeep(),
      cloneNode: () => ({ play: () => playBeep() }),
      volume: 0.5,
    };
    return obj;
  }
})();
</script>

</body>
</html>
